name: Desktop release

# Gera e publica o instalador Windows do KyberRock Desktop no GitHub Releases
# automaticamente sempre que a `main` muda. O `electron-updater` no app dos
# operadores baixa a nova versao em segundo plano e instala ao fechar o app
# (ver `apps/desktop/src/main/main.ts` -> configureAutoUpdater).
#
# Fluxo:
#   1. push na main (tocando o desktop) ou disparo manual;
#   2. a versao vira MAJOR.MINOR.<run_number> (sempre crescente, sem bump manual);
#   3. o token de LEITURA (secret GH_UPDATER_TOKEN) e injetado no app;
#   4. build do instalador NSIS + latest.yml + .blockmap;
#   5. electron-builder publica um GitHub Release `vX.Y.Z` com esses arquivos,
#      usando o GITHUB_TOKEN automatico do Actions (escopo de escrita fica no CI).

on:
  # Push na main que toca o desktop (ou suas dependencias) gera uma versao nova
  # e publica. O filtro de paths evita gastar minutos pagos do Actions (runner
  # Windows custa 2x em repo privado) com merges que nao mudam o instalador
  # (ex.: so edge functions em supabase/ ou docs/).
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "functions/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/desktop-release.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do build manual (opcional)"
        required: false
        default: ""

concurrency:
  group: desktop-release
  cancel-in-progress: false

permissions:
  contents: write # necessario para o electron-builder criar o GitHub Release

jobs:
  release:
    name: Build and publish Windows installer
    # windows-2022 traz o Visual Studio 2022, que o node-gyp reconhece. O
    # windows-latest passou a trazer um VS mais novo (v18) que o node-gyp
    # empacotado nao detecta, quebrando a compilacao nativa do better-sqlite3.
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --ignore-scripts evita o postinstall do better-sqlite3 tentar compilar
        # para o runtime de Node. O binario para o Electron e produzido depois
        # pelo rebuild:native:electron (dentro de dist:win:publish).
        run: npm ci --ignore-scripts

      - name: Resolve version (MAJOR.MINOR.run_number)
        id: version
        shell: bash
        # Roda depois do `npm ci` porque o `npm ci` exige que a versao do
        # workspace bata com o package-lock.json. O electron-builder le a versao
        # do package.json no momento do build, entao o bump aqui e suficiente e
        # nao e commitado de volta.
        run: |
          BASE=$(node -p "require('./apps/desktop/package.json').version")
          MAJOR_MINOR=$(echo "$BASE" | cut -d. -f1-2)
          export VERSION="${MAJOR_MINOR}.${GITHUB_RUN_NUMBER}"
          echo "Versao do release: $VERSION (base $BASE)"
          node -e "const f='apps/desktop/package.json';const fs=require('fs');const p=JSON.parse(fs.readFileSync(f,'utf8'));p.version=process.env.VERSION;fs.writeFileSync(f, JSON.stringify(p,null,4)+'\n');"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Inject updater read-token into the app
        shell: bash
        env:
          GH_UPDATER_TOKEN: ${{ secrets.GH_UPDATER_TOKEN }}
        run: |
          if [ -z "${GH_UPDATER_TOKEN:-}" ]; then
            echo "::warning title=Token de update ausente::Secret GH_UPDATER_TOKEN nao configurado. O release sera publicado, mas os apps instalados NAO conseguirao autenticar para baixar a atualizacao (repo privado). Crie um PAT fine-grained (Contents: read neste repo) e salve como GH_UPDATER_TOKEN."
          fi
          node -e "const f='apps/desktop/src/main/updater-config.ts';const fs=require('fs');let s=fs.readFileSync(f,'utf8');s=s.replace(/export const GITHUB_UPDATER_TOKEN = \"\";/, 'export const GITHUB_UPDATER_TOKEN = '+JSON.stringify(process.env.GH_UPDATER_TOKEN||'')+';');fs.writeFileSync(f,s);"

      - name: Build workspaces (packages before desktop)
        # O tsconfig do desktop nao referencia os pacotes @kyberrock/*, entao eles
        # precisam ser compilados antes (dist/*.d.ts). O build da raiz compila
        # todos os workspaces na ordem certa. Sem isto, o tsc do desktop falha com
        # "Cannot find module '@kyberrock/...'".
        run: npm run build

      - name: Create the GitHub release (tag + release) up front
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Criamos a release (e a tag) via API ANTES do electron-builder. Assim ele
        # so anexa os assets a uma release existente. Sem isto, o electron-builder
        # dispara duas criacoes concorrentes de release (uma por asset): a primeira
        # cria e a segunda falha com 422 "already_exists", abortando o upload do
        # .exe/latest.yml. Passo idempotente. Criar release ja cria a tag; push de
        # tag/release nao dispara o workflow (o gatilho e so branches: [main]).
        run: |
          set -euo pipefail
          TAG="v${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")
          if [ "$code" = "200" ]; then
            echo "Release $TAG ja existe, seguindo."
          else
            echo "Criando release $TAG..."
            curl -s -f -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/releases" \
              -d "{\"tag_name\":\"$TAG\",\"target_commitish\":\"${{ github.sha }}\",\"name\":\"KyberRock Desktop ${{ steps.version.outputs.version }}\",\"draft\":false,\"prerelease\":false}" \
              > /dev/null
            echo "Release $TAG criada."
          fi

      - name: Build and publish to GitHub Releases
        id: publish
        shell: bash
        # continue-on-error: o upload do electron-builder tem uma race conhecida
        # (ver run 29839470541: publicou o .exe mas abortou com 422 antes do
        # latest.yml/blockmap, deixando o auto-update cego). O passo seguinte
        # confere e completa os assets; se o build em si falhou, ele reprova o
        # job porque os arquivos nao existem localmente.
        continue-on-error: true
        env:
          # Token de PUBLICACAO (escrita) -- o GITHUB_TOKEN automatico do Actions,
          # limitado a este repo e ao run. Distinto do token de leitura embutido.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win:publish --workspace @kyberrock/desktop

      - name: Ensure every release asset is uploaded (self-heal)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Uma release sem latest.yml (ou sem o .exe/.blockmap) quebra o
        # electron-updater silenciosamente. Este passo garante o trio completo:
        # sobe qualquer asset que o electron-builder nao subiu e falha o run se
        # o build nao produziu os arquivos.
        run: |
          set -euo pipefail
          TAG="v${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          DIR="apps/desktop/release"

          exe=$(find "$DIR" -maxdepth 1 -name "*.exe" -not -name "*uninstaller*" | head -n1)
          blockmap=$(find "$DIR" -maxdepth 1 -name "*.exe.blockmap" | head -n1)
          latest="$DIR/latest.yml"
          for f in "$exe" "$blockmap" "$latest"; do
            if [ -z "$f" ] || [ ! -f "$f" ]; then
              echo "::error title=Build incompleto::Arquivo de release ausente localmente (exe='$exe' blockmap='$blockmap' latest.yml existe=$([ -f "$latest" ] && echo sim || echo nao)). O dist:win:publish falhou antes de gerar o instalador."
              exit 1
            fi
          done

          release=$(curl -s -f \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")
          release_id=$(echo "$release" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).id))")
          existing=$(echo "$release" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>JSON.parse(s).assets.forEach(a=>console.log(a.name)))")
          echo "Assets ja presentes na release $TAG:"
          echo "${existing:-<nenhum>}"

          for f in "$exe" "$blockmap" "$latest"; do
            base=$(basename "$f")
            name="${base// /-}" # electron-builder troca espacos por '-' no nome do asset
            if printf '%s\n' "$existing" | grep -qxF "$name"; then
              echo "OK: $name"
            else
              echo "Subindo asset ausente: $name"
              curl -s -f -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @"$f" \
                "https://uploads.github.com/repos/$REPO/releases/$release_id/assets?name=$name" > /dev/null
              echo "Enviado: $name"
            fi
          done
          echo "Release $TAG completa (exe + blockmap + latest.yml)."

      - name: Verify the native module is inside the package
        shell: bash
        # O app so abre se o better_sqlite3.node (binario nativo compilado para o
        # Electron) estiver empacotado (desempacotado do asar). Falhamos o run se
        # nao estiver, para nao dar por bom um instalador que nao abre.
        run: |
          echo "Procurando better_sqlite3.node em release/win-unpacked/resources..."
          found=$(find "apps/desktop/release/win-unpacked/resources" -name "better_sqlite3.node" 2>/dev/null || true)
          echo "Encontrado: ${found:-<nenhum>}"
          if [ -z "$found" ]; then
            echo "::error title=Nativo ausente::better_sqlite3.node NAO foi empacotado — o app nao abriria."
            echo "Todos os .node encontrados:"
            find "apps/desktop/release/win-unpacked/resources" -name "*.node" 2>/dev/null || true
            exit 1
          fi
          echo "OK: binario nativo presente no pacote."
