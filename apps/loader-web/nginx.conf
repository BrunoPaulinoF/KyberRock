server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers no nivel do server. ATENCAO: o nginx NAO herda `add_header` em um
    # `location` que declara qualquer `add_header` proprio — por isso estes cabecalhos sao
    # repetidos abaixo em cada location que adiciona Cache-Control. Sem a repeticao, os assets
    # (JS/CSS) e o env-config.js eram servidos sem X-Frame-Options/X-Content-Type-Options/CSP.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; base-uri 'self'; frame-ancestors 'self'; object-src 'none'" always;

    # Cache static assets
    location = /env-config.js {
        add_header Cache-Control "no-store, max-age=0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; base-uri 'self'; frame-ancestors 'self'; object-src 'none'" always;
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; base-uri 'self'; frame-ancestors 'self'; object-src 'none'" always;
    }

    # Link fixo de download do instalador do KyberRock Desktop.
    # Redireciona para a Edge Function publica, que resolve o .exe do Release
    # mais recente e redireciona para a URL assinada. Sempre baixa a versao mais
    # nova, sem gerar nada manualmente.
    location = /download {
        return 302 https://vksihzfrgqoemcqpquit.supabase.co/functions/v1/desktop-download;
    }

    # Handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
